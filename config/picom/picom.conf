#* ================================= shadow ================================= *#

shadow = true;
shadow-radius = 8;
shadow-opacity = 1;
shadow-offset-x = -8;
shadow-offset-y = -8;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'Microsoft-edge-dev'",
  "_GTK_FRAME_EXTENTS@:c",
];

#* ================================= fading ================================= *#

fading = true;
fade-delta = 7.5

fade-in-step = 0.5;
fade-out-step = 0.5;

#* ========================== transparency/opacity ========================== *#

frame-opacity = 1;

inactive-opacity = 1;
inactive-opacity-override = false;

opacity-rule = ["50:class_g = 'Bspwm' && class_i = 'presel_feedback'"];

focus-exclude = [ 
  "class_g = 'Cairo-clock'",
  "class_g = 'Microsoft-edge-dev'",
];

#* ================================= corners ================================ *#

corner-radius = 10;
corner-comparison = "legacy";

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#* =========================== background-blurring ========================== *#

blur-kern = "3x3box";

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Microsoft-edge-dev'",
  "_GTK_FRAME_EXTENTS@:c"
];

#* ================================= general ================================ *#

backend = "glx";
vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

glx-no-stencil = true;
use-damage = true;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 1; };
  dropdown_menu = { opacity = 1; };
};
