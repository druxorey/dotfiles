backend = "glx";
vsync = true;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

use-damage = true;
log-level = "warn";

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.5;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#1F1F1F"

frame-opacity = 1;

corner-radius = 16;
corner-comparison = "legacy";

blur-kern = "3x3box";

fading = true;
fade-delta = 7.5

fade-in-step = 0.5;
fade-out-step = 0.5;

rules = (

	{ match = "window_type = 'tooltip'"; fade = true; shadow = true; opacity = 1; focus = true; full-shadow = false; },
	{ match = "window_type = 'dock'"; shadow = true; clip-shadow-above = true; },
	{ match = "window_type = 'dnd'"; shadow = false; },
	{ match = "window_type = 'popup_menu' || window_type = 'dropdown_menu'"; opacity = 1; },
	{ match = "window_type = 'menu'"; shadow = false; blur-background = false; },
	{ match = "class_g ?= 'Notify-osd' || class_g = 'Cairo-clock' || _GTK_FRAME_EXTENTS@"; shadow = false; },
	{ match = "class_g = 'Cairo-clock' || _GTK_FRAME_EXTENTS@"; focus = true; },
	{ match = "window_type = 'desktop' || _GTK_FRAME_EXTENTS@"; blur-background = false; },
	{ match = "window_type = 'desktop'"; corner-radius = 0; },
	{ match = "class_g = 'Bspwm' && class_i = 'presel_feedback'"; opacity = 0.5; },

	{
		match = "window_type = 'normal'";
		animations = (
			{
				triggers = ["open"];
				opacity = {
					curve = "cubic-bezier(0,1,1,1)";
					duration = 0.25;
					start = 0;
					end = "window-raw-opacity";
				};
				blur-opacity = "opacity";
				shadow-opacity = "opacity";
				scale-x = {
					curve = "cubic-bezier(0,1.25,1,1)";
					duration = 0.25;
					start = 0.6;
					end = 1;
				};
				scale-y = "scale-x";
				offset-x = "(1 - scale-x) / 2 * window-width";
				offset-y = "(1 - scale-y) / 2 * window-height";
				shadow-scale-x = "scale-x";
				shadow-scale-y = "scale-y";
				shadow-offset-x = "offset-x";
				shadow-offset-y = "offset-y";
			},
			{
				triggers = ["close"];
				opacity = {
					curve = "cubic-bezier(0,1,1,1)";
					duration = 0.15;
					start = "window-raw-opacity-before";
					end = 0;
				};
				blur-opacity = "opacity";
				shadow-opacity = "opacity";
				scale-x = {
					curve = "cubic-bezier(0,1.3,1,1)";
					duration = 0.15;
					start = 1;
					end = 0.6;
				};
				scale-y = "scale-x";
				offset-x = "(1 - scale-x) / 2 * window-width";
				offset-y = "(1 - scale-y) / 2 * window-height";
				shadow-scale-x = "scale-x";
				shadow-scale-y = "scale-y";
				shadow-offset-x = "offset-x";
				shadow-offset-y = "offset-y";
			},
			{
				triggers = ["show"];
				opacity = {
					curve = "cubic-bezier(0,1,1,1)";
					duration = 0.15;
					start = 0;
					end = "window-raw-opacity";
				};
			},
			{
				triggers = ["hide"];
				opacity = {
					curve = "linear";
					duration = 0.15;
					start = "window-raw-opacity-before";
					end = 0;
				};
				blur-opacity = "opacity";
				shadow-opacity = "opacity";
			},
			{
				triggers = ["geometry"];
				scale-x = {
					curve = "cubic-bezier(0,0,0,1.15)";
					duration = 0.25;
					start = "window-width-before / window-width";
					end = 1;
				};
				scale-x-reverse = {
					curve = "cubic-bezier(0,0,0,1.15)";
					duration = 0.25;
					start = "window-width / window-width-before";
					end = 1;
				};
				scale-y = {
					curve = "cubic-bezier(0,0,0,1.15)";
					duration = 0.25;
					start = "window-height-before / window-height";
					end = 1;
				};
				scale-y-reverse = {
					curve = "cubic-bezier(0,0,0,1.15)";
					duration = 0.25;
					start = "window-height / window-height-before";
					end = 1;
				};
				offset-x = {
					curve = "cubic-bezier(0,0,0,1.15)";
					duration = 0.25;
					start = "window-x-before - window-x";
					end = 0;
				};
				offset-y = {
					curve = "cubic-bezier(0,0,0,1.15)";
					duration = 0.25;
					start = "window-y-before - window-y";
					end = 0;
				};
				shadow-scale-x = "scale-x";
				shadow-scale-y = "scale-y";
				shadow-offset-x = "offset-x";
				shadow-offset-y = "offset-y";
			}
		)
	},
	{
		match = "class_g = 'Dunst'";
		animations = (
			{
				triggers = ["close", "hide"];
				preset = "fly-out";
				direction = "right";
				duration = 0.25;
			},
			{
				triggers = ["open", "show"];
				preset = "fly-in";
				direction = "right";
				duration = 0.15;
			}
		)
	}
)
