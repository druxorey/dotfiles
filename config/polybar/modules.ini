[module/cmus]
type = custom/script
exec = ~/.config/polybar/scripts/get-cmus.sh
click-left = cmus-remote -u
click-right = sh "$HOME/.config/rofi/scripts/panel_music.sh"
interval = 1

label = " %output% "

format = <label>
format-background = ${theme.drx-color-base-1}
format-foreground = ${theme.drx-color-text}

[module/arch]
type = custom/text
click-left = sh ~/.config/rofi/scripts/menu_start.sh polybar

label = " ůį£á "

format = <label>
format-background = ${theme.drx-color-base-1}
format-foreground = ${theme.drx-color-accent}

[module/power]
type = custom/text
click-left = sh ~/.config/rofi/scripts/panel_power.sh polybar

label = " ‚ŹĽ "

format = <label>
format-background = ${theme.drx-color-base-1}
format-foreground = ${theme.drx-color-accent}

[module/get-processes]
type = custom/script
exec = ~/.config/polybar/scripts/get-processes.sh
click-left = sh ~/.config/polybar/scripts/kill-processes.sh
interval = 1

label = " %output%    "

format = <label>
format-background = ${theme.drx-color-base-1}
format-foreground = ${theme.drx-color-text}

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/get-bluetooth.sh
click-left = blueman-manager
interval = 1

label = " %output% "

format = <label>
format-background = ${theme.drx-color-base-1}
format-foreground = ${theme.drx-color-text}

[module/windows]
type = custom/script
exec = ~/.config/polybar/scripts/get-windows.sh
click-left = bspc node -f next.local.window
click-right = bspc node -f prev.local.window
interval = 1

label = "    ůĪā¨  %output% "

format = <label>
format-background = ${theme.drx-color-base-1}
format-foreground = ${theme.drx-color-text}

[module/github]
type = internal/github

token = ${file:/home/druxorey/.local/share/github/access.token}
user = druxorey
interval = 10
api-url = https://api.github.com/

label = "    Ôāõ   %notifications% "

format = <label>
format-background = ${theme.drx-color-base-1}
format-foreground = ${theme.drx-color-text}

format-offline = ""

;* ========================================================================== *;

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt
group-by-monitor = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = ůįģĮ
label-active-foreground = ${theme.drx-color-accent}
label-active-background = ${theme.drx-color-base-1}
label-active-padding = 1

label-occupied = ůįä†
label-occupied-foreground = ${theme.drx-color-text}
label-occupied-background = ${theme.drx-color-base-1}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-foreground = ${theme.drx-color-text}
label-urgent-background = ${theme.drx-color-alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${theme.drx-color-deactivate}
label-empty-background = ${theme.drx-color-base-1}
label-empty-padding = 1

;* ========================================================================== *;

