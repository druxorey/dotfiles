PLATFORM_PROFILE_ON_AC="performance"              # Use max cooling and hardware power limits
PLATFORM_PROFILE_ON_BAT="balanced"                # Standard balance between power and cooling

CPU_ENERGY_PERF_POLICY_ON_AC="performance"        # EPP hint prioritizes raw calculation speed
CPU_ENERGY_PERF_POLICY_ON_BAT="balance_power"     # EPP hint leans towards power efficiency
CPU_SCALING_GOVERNOR_ON_AC="performance"          # Keep CPU at high frequencies proactively
CPU_SCALING_GOVERNOR_ON_BAT="powersave"           # Allow CPU to downclock aggressively

CPU_SCALING_MIN_FREQ_ON_AC="400000"               # Min allowed CPU frequency is 400 MHz
CPU_SCALING_MAX_FREQ_ON_AC="4100000"              # Max allowed CPU frequency is 4.1 GHz
CPU_SCALING_MIN_FREQ_ON_BAT="400000"              # Min allowed CPU frequency is 400 MHz
CPU_SCALING_MAX_FREQ_ON_BAT="2400000"             # Hard cap max CPU frequency at 2.4 GHz

CPU_MIN_PERF_ON_AC=0                              # Allow Intel P-State to scale down to 0% idle
CPU_MAX_PERF_ON_AC=100                            # Allow Intel P-State to use 100% capacity
CPU_MIN_PERF_ON_BAT=0                             # Allow Intel P-State to scale down to 0% idle
CPU_MAX_PERF_ON_BAT=60                            # Restrict P-State max capacity to 60%

CPU_BOOST_ON_AC=1                                 # 1 = Enable CPU Turbo Boost feature
CPU_BOOST_ON_BAT=0                                # 0 = Disable CPU Turbo Boost

INTEL_GPU_MIN_FREQ_ON_AC=300                      # Min iGPU frequency is 300 MHz
INTEL_GPU_MAX_FREQ_ON_AC=1100                     # Max iGPU frequency is 1100 MHz
INTEL_GPU_BOOST_FREQ_ON_AC=1100                   # Allow iGPU dynamic boost up to 1100 MHz
INTEL_GPU_MIN_FREQ_ON_BAT=300                     # Min iGPU frequency is 300 MHz
INTEL_GPU_MAX_FREQ_ON_BAT=800                     # Hard cap iGPU frequency at 800 MHz
INTEL_GPU_BOOST_FREQ_ON_BAT=800                   # Limit iGPU dynamic boost to 800 MHz

PCIE_ASPM_ON_AC="performance"                     # Keep PCIe links active for max throughput
PCIE_ASPM_ON_BAT="powersave"                      # Force PCIe links (NVMe/WiFi) to deep sleep L1
NVMED_AUTOSUSPEND="1"                             # Enable NVMe Autonomous Power State Transitions
RUNTIME_PM_ON_AC="on"                             # 'on'   = Keep PCIe devices always awake
RUNTIME_PM_ON_BAT="auto"                          # 'auto' = Suspend unused PCIe devices

WIFI_PWR_ON_AC="off"                              # 'off' = Disable Wi-Fi power saving features
WIFI_PWR_ON_BAT="on"                              # 'on'  = Enable Wi-Fi power saving features
BLUETOOTH_PWR_ON_AC="off"                         # 'off' = Disable Bluetooth power saving
BLUETOOTH_PWR_ON_BAT="on"                         # 'on'  = Enable Bluetooth power saving
DEVICES_TO_DISABLE_ON_BAT_NOT_IN_USE="bluetooth"  # Auto-kill Bluetooth radio on BAT if unconnected

SOUND_POWER_SAVE_ON_AC="0"                        # 0 = Disable audio codec power saving
SOUND_POWER_SAVE_ON_BAT="1"                       # 1 = Suspend audio codec when idle (1s timeout)
AUDIO_POWER_ON_AC="0"                             # 0 = Disable audio controller power saving
AUDIO_POWER_ON_BAT="1"                            # 1 = Enable audio controller power saving

USB_AUTOSUSPEND="1"                               # 1: Enable automatic suspension of idle USB devices
WOL_DISABLE="Y"                                   # Y: Disable Wake-on-LAN to stop NIC battery drain
NMI_WATCHDOG="0"                                  # 0: Disable NMI watchdog timer to save battery
