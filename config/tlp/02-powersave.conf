PLATFORM_PROFILE_ON_AC="quiet"                         # Restrict power to keep fans quiet/off
PLATFORM_PROFILE_ON_BAT="quiet"                        # Restrict power to keep fans quiet/off

CPU_ENERGY_PERF_POLICY_ON_AC="power"                   # EPP hint prioritizes extreme energy saving
CPU_ENERGY_PERF_POLICY_ON_BAT="power"                  # EPP hint prioritizes extreme energy saving
CPU_SCALING_GOVERNOR_ON_AC="powersave"                 # Keep CPU frequencies as low as possible
CPU_SCALING_GOVERNOR_ON_BAT="powersave"                # Keep CPU frequencies as low as possible

CPU_SCALING_MIN_FREQ_ON_AC="400000"                    # Min allowed CPU frequency is 400 MHz
CPU_SCALING_MAX_FREQ_ON_AC="1200000"                   # Hard cap max CPU frequency at 1.2 GHz
CPU_SCALING_MIN_FREQ_ON_BAT="400000"                   # Min allowed CPU frequency is 400 MHz
CPU_SCALING_MAX_FREQ_ON_BAT="1200000"                  # Hard cap max CPU frequency at 1.2 GHz

CPU_MIN_PERF_ON_AC=0                                   # Allow Intel P-State to scale down to 0% idle
CPU_MAX_PERF_ON_AC=30                                  # Restrict P-State max capacity to 30%
CPU_MIN_PERF_ON_BAT=0                                  # Allow Intel P-State to scale down to 0% idle
CPU_MAX_PERF_ON_BAT=30                                 # Restrict P-State max capacity to 30%

CPU_BOOST_ON_AC=0                                      # 0 = Disable CPU Turbo Boost
CPU_BOOST_ON_BAT=0                                     # 0 = Disable CPU Turbo Boost

INTEL_GPU_MIN_FREQ_ON_AC=300                           # Min iGPU frequency is 300 MHz
INTEL_GPU_MAX_FREQ_ON_AC=300                           # Hard cap iGPU frequency at 300 MHz
INTEL_GPU_BOOST_FREQ_ON_AC=300                         # Disable iGPU dynamic boost (fixed at 300)
INTEL_GPU_MIN_FREQ_ON_BAT=300                          # Min iGPU frequency is 300 MHz
INTEL_GPU_MAX_FREQ_ON_BAT=300                          # Hard cap iGPU frequency at 300 MHz
INTEL_GPU_BOOST_FREQ_ON_BAT=300                        # Disable iGPU dynamic boost (fixed at 300)

PCIE_ASPM_ON_AC="powersave"                            # Force PCIe links (NVMe/WiFi) to deep sleep L1
PCIE_ASPM_ON_BAT="powersave"                           # Force PCIe links (NVMe/WiFi) to deep sleep L1
NVMED_AUTOSUSPEND="1"                                  # 1: Enable NVMe Autonomous Power State Transitions
RUNTIME_PM_ON_AC="auto"                                # 'auto' = Suspend unused PCIe devices
RUNTIME_PM_ON_BAT="auto"                               # 'auto' = Suspend unused PCIe devices

WIFI_PWR_ON_AC="on"                                    # 'on' = Enable Wi-Fi power saving features
WIFI_PWR_ON_BAT="on"                                   # 'on' = Enable Wi-Fi power saving features
BLUETOOTH_PWR_ON_AC="on"                               # 'on' = Enable Bluetooth power saving
BLUETOOTH_PWR_ON_BAT="on"                              # 'on' = Enable Bluetooth power saving
DEVICES_TO_DISABLE_ON_BAT_NOT_IN_USE="bluetooth wwan"  # Auto-kill BT and WWAN radios on BAT if unconnected

SOUND_POWER_SAVE_ON_AC="1"                             # 1 = Suspend audio codec when idle (1s timeout)
SOUND_POWER_SAVE_ON_BAT="1"                            # 1 = Suspend audio codec when idle (1s timeout)
AUDIO_POWER_ON_AC="1"                                  # 1 = Enable audio controller power saving
AUDIO_POWER_ON_BAT="1"                                 # 1 = Enable audio controller power saving

USB_AUTOSUSPEND="1"                                    # 1: Enable automatic suspension of idle USB devices
WOL_DISABLE="Y"                                        # Y: Disable Wake-on-LAN to stop NIC battery drain
NMI_WATCHDOG="0"                                       # 0: Disable NMI watchdog timer to save battery
