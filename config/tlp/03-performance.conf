PLATFORM_PROFILE_ON_AC="performance"         # Use max cooling and hardware power limits
PLATFORM_PROFILE_ON_BAT="performance"        # Use max cooling and hardware power limits

CPU_ENERGY_PERF_POLICY_ON_AC="performance"   # EPP hint prioritizes raw calculation speed
CPU_ENERGY_PERF_POLICY_ON_BAT="performance"  # EPP hint prioritizes raw calculation speed
CPU_SCALING_GOVERNOR_ON_AC="performance"     # Keep CPU at high frequencies proactively
CPU_SCALING_GOVERNOR_ON_BAT="performance"    # Keep CPU at high frequencies proactively

CPU_SCALING_MIN_FREQ_ON_AC="800000"          # Raise min allowed CPU frequency to 800 MHz
CPU_SCALING_MAX_FREQ_ON_AC="4100000"         # Max allowed CPU frequency is 4.1 GHz
CPU_SCALING_MIN_FREQ_ON_BAT="800000"         # Raise min allowed CPU frequency to 800 MHz
CPU_SCALING_MAX_FREQ_ON_BAT="4100000"        # Max allowed CPU frequency is 4.1 GHz

CPU_MIN_PERF_ON_AC=0                         # Allow Intel P-State to scale down to 0% idle
CPU_MAX_PERF_ON_AC=100                       # Allow Intel P-State to use 100% capacity
CPU_MIN_PERF_ON_BAT=0                        # Allow Intel P-State to scale down to 0% idle
CPU_MAX_PERF_ON_BAT=100                      # Allow Intel P-State to use 100% capacity

CPU_BOOST_ON_AC=1                            # 1 = Enable CPU Turbo Boost feature
CPU_BOOST_ON_BAT=1                           # 1 = Enable CPU Turbo Boost feature

INTEL_GPU_MIN_FREQ_ON_AC=300                 # Min iGPU frequency is 300 MHz
INTEL_GPU_MAX_FREQ_ON_AC=1100                # Max iGPU frequency is 1100 MHz
INTEL_GPU_BOOST_FREQ_ON_AC=1100              # Allow iGPU dynamic boost up to 1100 MHz
INTEL_GPU_MIN_FREQ_ON_BAT=300                # Min iGPU frequency is 300 MHz
INTEL_GPU_MAX_FREQ_ON_BAT=1100               # Max iGPU frequency is 1100 MHz
INTEL_GPU_BOOST_FREQ_ON_BAT=1100             # Allow iGPU dynamic boost up to 1100 MHz

PCIE_ASPM_ON_AC="performance"                # Keep PCIe links active for max throughput
PCIE_ASPM_ON_BAT="performance"               # Keep PCIe links active for max throughput
NVMED_AUTOSUSPEND="0"                        # 0: Disable NVMe power transitions (max speed)
RUNTIME_PM_ON_AC="on"                        # 'on' = Keep PCIe devices always awake
RUNTIME_PM_ON_BAT="on"                       # 'on' = Keep PCIe devices always awake

WIFI_PWR_ON_AC="off"                         # 'off' = Disable Wi-Fi power saving features
WIFI_PWR_ON_BAT="off"                        # 'off' = Disable Wi-Fi power saving features
BLUETOOTH_PWR_ON_AC="off"                    # 'off' = Disable Bluetooth power saving
BLUETOOTH_PWR_ON_BAT="off"                   # 'off' = Disable Bluetooth power saving

SOUND_POWER_SAVE_ON_AC="0"                   # 0 = Disable audio codec power saving
SOUND_POWER_SAVE_ON_BAT="0"                  # 0 = Disable audio codec power saving
AUDIO_POWER_ON_AC="0"                        # 0 = Disable audio controller power saving
AUDIO_POWER_ON_BAT="0"                       # 0 = Disable audio controller power saving

USB_AUTOSUSPEND="0"                          # 0: Disable automatic suspension of USB devices
WOL_DISABLE="N"                              # N: Enable Wake-on-LAN (network card stays ready)
NMI_WATCHDOG="1"                             # 1: Enable NMI watchdog timer for kernel debugging
