<touchégg>
	<settings>
		<property name="animation_delay">150</property>
		<property name="action_execute_threshold">5</property>
		<property name="color">auto</property>
		<property name="borderColor">auto</property>
	</settings>

	<application name="All">
		
		<gesture type="PINCH" fingers="2" direction="IN">
			<action type="SEND_KEYS">
				<modifiers>Control_L</modifiers>
				<keys>KP_Subtract</keys>
				<decreaseKeys>KP_Add</decreaseKeys>
			</action>
		</gesture>
		<gesture type="PINCH" fingers="2" direction="OUT">
			<action type="SEND_KEYS">
				<modifiers>Control_L</modifiers>
				<keys>KP_Add</keys>
				<decreaseKeys>KP_Subtract</decreaseKeys>
			</action>
		</gesture>

		<gesture type="SWIPE" fingers="3" direction="UP">
			<action type="RUN_COMMAND">
				<command>bspc node -t fullscreen</command>
				<repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>
		<gesture type="SWIPE" fingers="3" direction="DOWN">
			<action type="RUN_COMMAND">
				<command>bspc node -t tiled</command>
				<repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>

		<gesture type="SWIPE" fingers="4" direction="RIGHT">
			<action type="RUN_COMMAND">
				<command>bspc desktop -f next.local</command>
				<repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>
		<gesture type="SWIPE" fingers="4" direction="LEFT">
			<action type="RUN_COMMAND">
				<command>bspc desktop -f prev.local</command>
				<repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>

		<gesture type="SWIPE" fingers="4" direction="UP">
			<action type="RUN_COMMAND">
				<command>bspc node -f next.local.window</command>
				<repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>
		<gesture type="SWIPE" fingers="4" direction="DOWN">
			<action type="RUN_COMMAND">
				<command>bspc node -f prev.local.window</command>
				<repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>

	</application>

	<application name="Google-chrome,Firefox,Brave-browser,Chromium">
		<gesture type="SWIPE" fingers="3" direction="RIGHT">
			<action type="SEND_KEYS">
				<modifiers>Alt_L</modifiers>
				<keys>Right</keys>
				<repeat>false</repeat>
				<animation>NONE</animation>
				<on>begin</on>
			</action>
		</gesture>
		<gesture type="SWIPE" fingers="3" direction="LEFT">
			<action type="SEND_KEYS">
				<modifiers>Alt_L</modifiers>
				<keys>Left</keys>
				<repeat>false</repeat>
				<animation>NONE</animation>
				<on>begin</on>
			</action>
		</gesture>
	</application>

	<application name="Sxiv">
		<gesture type="PINCH" fingers="2" direction="OUT">
			<action type="SEND_KEYS">
				<keys>plus</keys>
				<decreaseKeys>minus</decreaseKeys>
			</action>
		</gesture>

		<gesture type="PINCH" fingers="2" direction="IN">
			<action type="SEND_KEYS">
				<keys>minus</keys>
				<decreaseKeys>plus</decreaseKeys>
			</action>
		</gesture>
		
		<gesture type="SWIPE" fingers="3" direction="RIGHT">
			<action type="SEND_KEYS">
				<keys>n</keys> <repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>
		<gesture type="SWIPE" fingers="3" direction="LEFT">
			<action type="SEND_KEYS">
				<keys>p</keys> <repeat>false</repeat>
				<on>begin</on>
			</action>
		</gesture>
	</application>

</touchégg>
