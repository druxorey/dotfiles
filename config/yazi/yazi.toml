[preview]
image_delay     = 1

[opener]
edit = [
	{ run = '${EDITOR:-vi} %s', desc = "Default",            for = "unix", block = true },
	{ run = 'vim %s',           desc = "Vim",                for = "unix", block = true },
	{ run = 'code %s',          desc = "Visual Studio Code", for = "unix", block = true },
]
image = [
	{ run = "xdg-open %s", desc = "Default",           for = "unix", orphan = true },
	{ run = "nsxiv %s",    desc = "nsxiv",             for = "unix", orphan = true },
	{ run = "gthumb %s",   desc = "gthumb",            for = "unix", orphan = true },
	{ run = "gimp %s",     desc = "GIMP",              for = "unix", orphan = true },
	{ run = "brave %s",    desc = "Brave",             for = "unix", orphan = true },
	{ run = "pdfarranger %s", desc = "PDF Arranger",   for = "unix", orphan = true },
]
pdf = [
	{ run = "xdg-open %s",    desc = "Default",        for = "unix", orphan = true },
	{ run = "zathura %s",     desc = "Zathura",        for = "unix", orphan = true },
	{ run = "pdfarranger %s", desc = "PDF Arranger",   for = "unix", orphan = true },
]
play = [
	{ run = "xdg-open %s", desc = "Default",           for = "unix", orphan = true },
	{ run = "mpv %s",      desc = "mpv",               for = "unix", orphan = true },
	{ run = "vlc %s",      desc = "VLC",               for = "unix", orphan = true },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "unix" },
]
open = [
	{ run = "xdg-open %s1", desc = "Open",             for = "unix" },
]
reveal = [
	{ run = "xdg-open %d1", desc = "Reveal",           for = "unix" },
	{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here", for = "unix" },
]
download = [
	{ run = "ya emit download --open %S", desc = "Download and open", for = "unix" },
	{ run = "ya emit download %S",        desc = "Download",          for = "unix" },
]

[open]
rules = [
	{ url = "*/", use = [ "edit", "open", "reveal" ] },
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "image/*", use = [ "image", "reveal" ] },
	{ mime = "application/pdf", use = [ "pdf", "reveal" ] },
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	{ mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
	{ mime = "*/javascript", use = [ "edit", "reveal" ] },
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	{ mime = "vfs/{absent,stale}", use = "download" },
	{ url = "*", use = [ "open", "reveal" ] },
]

[plugin]
prepend_previewers = [
	{ url = "*.csv", run = "rich-preview"},
	{ url = "*.md", run = "rich-preview" },
	{ name = "*/", run = "folder" },
	{ name = "/run/user/1000/gvfs/**/*", run = "noop" },
	{ name = "/run/media/druxorey/**/*", run = "noop" },
]
prepend_preloaders = [
  { name = "/run/user/1000/gvfs/**/*", run = "noop" },
  { name = "/run/media/druxorey/**/*", run = "noop" },
]
